<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chai Mahal</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ====== General Styles ====== */
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: #3e2723;
      /* Working tea background image */
      background: 
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
        url('https://images.unsplash.com/photo-1587731506546-02a3f9c83790?auto=format&fit=crop&w=1600&q=100') 
        no-repeat center center fixed;
      background-size: cover;
    }

    /* ====== Marquee ====== */
    .marquee {
      background: rgba(255, 179, 0, 0.95);
      color: #4e342e;
      font-weight: bold;
      overflow: hidden;
      white-space: nowrap;
      padding: 10px 0;
      font-size: 18px;
    }

    .marquee span {
      display: inline-block;
      padding-left: 100%;
      animation: marquee 12s linear infinite;
    }

    @keyframes marquee {
      0% { transform: translateX(0%); }
      100% { transform: translateX(-100%); }
    }

    /* ====== Header ====== */
    header {
      background: rgba(66, 32, 9, 0.9);
      color: white;
      text-align: center;
      padding: 25px 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    header h1 {
      font-family: 'Pacifico', cursive;
      font-size: 50px;
      margin: 0;
      letter-spacing: 2px;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #ffb300;
    }

    /* ====== Section ====== */
    section {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      border-radius: 15px;
      padding: 60px 20px;
      margin: 40px;
      color: #fff;
      text-align: center;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }

    h2 {
      font-family: 'Pacifico', cursive;
      font-size: 36px;
      color: #ffeb3b;
      margin-bottom: 20px;
    }

    p {
      color: #f5f5f5;
    }

    /* ====== Cards ====== */
    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
      margin-top: 40px;
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      color: #4e342e;
      width: 250px;
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    .card button {
      background: #ffb300;
      color: #4e342e;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
    }

    .card button:hover {
      background: #ffa000;
      transform: scale(1.05);
    }

    /* ====== Contact Form ====== */
    form {
      display: flex;
      flex-direction: column;
      max-width: 400px;
      margin: 0 auto;
      gap: 12px;
    }

    input, textarea {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      padding: 12px;
      border: none;
      background-color: #ffb300;
      color: #4e342e;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background-color: #ffa000;
      transform: scale(1.05);
    }

    footer {
      background: rgba(66, 32, 9, 0.9);
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }

    /* ====== Popup Order Form ====== */
    .order-popup {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .order-content {
      background: white;
      color: #4e342e;
      padding: 25px;
      border-radius: 15px;
      width: 320px;
      box-shadow: 0 4px 25px rgba(0,0,0,0.5);
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: scale(0.9);}
      to {opacity: 1; transform: scale(1);}
    }

    .close-btn {
      float: right;
      font-weight: bold;
      color: #ff7043;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Marquee -->
  <div class="marquee">
    <span>Welcome to Chai Mahal! Enjoy the finest chai in Pakistan! ☕</span>
  </div>

  <!-- Header -->
  <header>
    <h1>Chai Mahal</h1>
    <nav>
      <a href="#home">Home</a>
      <a href="#menu">Menu</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <!-- Home -->
  <section id="home">
    <h2>Welcome to Chai Mahal!</h2>
    <p>Discover a world of aromatic and flavorful teas crafted for your perfect moment.</p>
    <button onclick="alert('Thank you for your interest! Browse our menu to order.')">Explore Menu</button>
  </section>

  <!-- Menu -->
  <section id="menu">
    <h2>Our Chai Varieties</h2>
    <div class="cards" id="menuCards"></div>
  </section>

  <!-- Contact -->
  <section id="contact">
    <h2>Contact Us</h2>
    <form id="contactForm">
      <input type="text" placeholder="Your Name" required />
      <input type="email" placeholder="Your Email" required />
      <textarea placeholder="Your Message" required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Chai Mahal. All rights reserved.</p>
  </footer>

  <!-- Order Popup -->
  <div class="order-popup" id="orderPopup">
    <div class="order-content">
      <span class="close-btn" onclick="closePopup()">&times;</span>
      <h3 id="chaiName">Order Chai</h3>
      <form id="orderForm">
        <input type="text" id="customerName" placeholder="Your Name" required />
        <input type="number" id="customerPhone" placeholder="Phone Number" required />
        <input type="number" id="chaiQty" placeholder="Quantity" required />
        <button type="submit">Place Order</button>
      </form>
    </div>
  </div>

  <script>
    const menuData = [
      {name: 'Masala Chai', price: 150, img: '1.jpg'},
      {name: 'Ginger Chai', price: 130, img: '2.jpg'},
      {name: 'Green Chai', price: 180, img: '3.jpg'},
      {name: 'Cardamom Chai', price: 160, img: '4.jpg'},
      {name: 'Elaichi Chai', price: 155, img: '5.jpg'},
      {name: 'Mint Chai', price: 140, img: '6.jpg'},
      {name: 'Honey Chai', price: 170, img: '7.jpg'},
      {name: 'Lemon Chai', price: 135, img: '8.jpg'},
      {name: 'Black Tea', price: 120, img: '9.jpg'},
      {name: 'Chocolate Chai', price: 200, img: '10.jpg'},
      {name: 'Oolong Chai', price: 220, img: '11.jpg'},
      {name: 'Saffron Chai', price: 250, img: '12.jpg'},
    ];

    const cardsContainer = document.getElementById('menuCards');
    const popup = document.getElementById('orderPopup');
    const orderForm = document.getElementById('orderForm');
    const chaiNameElement = document.getElementById('chaiName');

    menuData.forEach(chai => {
      const card = document.createElement('div');
      card.classList.add('card');
      card.innerHTML = `
        <img src="${chai.img}" alt="${chai.name}">
        <h3>${chai.name}</h3>
        <p>Price: PKR ${chai.price}</p>
        <button onclick="openPopup('${chai.name}')">Order Now</button>
      `;
      cardsContainer.appendChild(card);
    });

    function openPopup(chaiName) {
      chaiNameElement.textContent = 'Order ' + chaiName;
      popup.style.display = 'flex';
    }

    function closePopup() {
      popup.style.display = 'none';
      orderForm.reset();
    }

    orderForm.addEventListener('submit', function(e) {
      e.preventDefault();
      alert("✅ Thank you for your order! We’ll contact you soon.");
      orderForm.reset();
      closePopup();
    });

    document.getElementById("contactForm").addEventListener("submit", function(e){
      e.preventDefault();
      alert("📩 Thank you for contacting Chai Mahal! We'll get back to you soon.");
      this.reset();
    });
  </script>
</body>
</html>
